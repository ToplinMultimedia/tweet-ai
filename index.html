<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tweet Scorer AI TrendX - Beast Mode</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{background:linear-gradient(135deg,#0f172a,#1e293b);}
.glow{box-shadow:0 0 18px rgba(59,130,246,.35);}
</style>
</head>
<body class="text-white min-h-screen p-3 md:p-6">

<div class="max-w-6xl mx-auto">

<h1 class="text-2xl md:text-4xl font-bold text-center mb-2">Tweet Scorer AI TrendX 🚀</h1>
<p class="text-center text-gray-300 mb-5 text-sm md:text-base">⚡ Modular Viral Intelligence Engine</p>

<div class="grid md:grid-cols-2 gap-4">

<!-- LEFT PANEL -->
<div class="bg-gray-800 p-4 md:p-5 rounded-xl glow">

<select id="mode" class="w-full p-3 bg-gray-700 rounded mb-3">
<option value="analyze">Analyze Tweet</option>
<option value="generate">Generate Tweets</option>
<option value="comment">Comment Scorer</option>
<option value="detect">Human vs AI</option>
<option value="hunter">Comment Hunter</option>
<option value="thread">Thread Generator</option>
</select>

<input id="apiKey" type="password" placeholder="Groq API Key"
class="w-full p-3 bg-gray-700 rounded mb-3">

<select id="niche" onchange="toggleCustom()" class="w-full p-3 bg-gray-700 rounded mb-3">
<option>Tech</option><option>Gaming</option><option>Sports</option><option>Business</option><option>Crypto</option><option>Motivation</option><option>AI</option><option>Graphics Design</option><option>Efootball</option><option>Christianity and Faith</option><option>Nigeria Lifestyle</option><option>Advice and Counselling</option><option>Web Development</option><option>Relationship</option><option>Custom</option>
</select>

<input id="customNiche" class="hidden w-full p-3 bg-gray-700 rounded mb-3" placeholder="Custom niche">

<select id="vibe" class="w-full p-3 bg-gray-700 rounded mb-3">
<option>Educational</option><option>Conversational</option><option>Hot take</option><option>Professional</option><option>Storytelling</option><option>Inspirational</option><option>Pure Cruise</option><option>Savage Banter</option><option>Expert Authority</option><option>Funny</option><option>Nigerian Casual</option>
</select>

<select id="goal" class="w-full p-3 bg-gray-700 rounded mb-3">
<option>Reply Bait</option><option>Shareable</option><option>Viral</option><option>Bookmarkable</option><option>Debate</option>
</select>

<label class="text-sm">Humanizer</label>
<input id="humanizer" type="range" min="0" max="100" value="70" class="w-full mb-3">

<textarea id="input" class="w-full p-3 bg-gray-700 rounded h-28" placeholder="Type or leave blank"></textarea>

<button onclick="runAI()" class="w-full mt-3 p-3 bg-blue-600 rounded font-bold">Run Beast Mode</button>

</div>

<!-- RIGHT PANEL -->
<div class="bg-gray-800 p-4 md:p-5 rounded-xl glow">

<div id="trendBox" class="hidden mb-3 p-3 bg-gray-700 rounded"></div>

<div id="multiOutput" class="hidden space-y-3"></div>

<button id="refineBtn" onclick="beastRefine()" class="hidden mt-3 w-full p-3 bg-purple-600 rounded font-bold">🔥 Auto Beast Optimize</button>

</div>

</div>
</div>

<script>
const $ = id => document.getElementById(id);
let lastTweets = [];

function toggleCustom(){
  const niche = $("niche").value;
  $("customNiche").classList.toggle("hidden", niche !== "Custom");
}

function scoreAdvanced(t){
let hook=t.length>80?8:9;
let emotion=/😂|😭|🔥/.test(t)?8:6;
let controversy=/hot take|unpopular|nobody/i.test(t)?9:5;
let engagement=/\?|👇/.test(t)?9:5;
let vir=(hook+emotion+controversy+engagement)/4;
return Math.round(((hook+emotion+controversy+engagement+vir)/5)*10);
}

function getTrends(n){
return {
Tech:["AI Agents","GPT"],Gaming:["eFootball","Koller"],Sports:["UCL","Transfers"],Business:["Startups","Side Hustle"],Crypto:["BTC","Altcoins"],Motivation:["Hustle","Discipline"]
}[n]||["Trending"];
}

async function runAI(){

const key=$('apiKey').value;
const mode=$('mode').value;
const niche=$('niche').value;
const human=$('humanizer').value;
const text=$('input').value;
const trends=getTrends(niche);

$('trendBox').classList.remove('hidden');
$('trendBox').innerText='Trends: '+trends.join(', ');

// BASE SYSTEM (NO RIGID FORMAT)
let system=`You are a viral X content strategist and algorithm optimizer.
You maximize engagement, retention, and shareability.
Niche:${niche}
Vibe:${$('vibe').value}
Goal:${$('goal').value}
Human:${human}%
Trends:${trends.join(',')}`;

// MODE LOGIC (IMPORTANT FIX)
if(mode === "generate"){
system += `\nGenerate exactly 4 tweet options. No explanations.`;
}

if(mode === "analyze"){
system += `\nAnalyze tweet performance and rewrite ONE improved version.`;
}

if(mode === "comment"){
system += `\nRewrite comment to be more engaging and reply-worthy.`;
}

if(mode === "thread"){
system += `\nConvert into a viral thread (4–8 tweets).`;
}

const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
method:"POST",
headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
body:JSON.stringify({
model:"llama-3.3-70b-versatile",
messages:[
{role:"system",content:system},
{role:"user",content:text||"Generate viral content"}
],temperature:0.95
})
});

const data=await res.json();
const out=data?.choices?.[0]?.message?.content||"";

console.log("RAW:",out);

// ROBUST PARSER
let tweets=out
.replace(/\r/g,"\n")
.split("\n")
.map(t=>t.replace(/^(\d+[.)-]?\s*)/,"").trim())
.filter(t=>t.length>10);

if(tweets.length<4){
tweets=out.split(". ").map(t=>t.trim()).filter(t=>t.length>10);
}

if(tweets.length<4){
tweets=Array(4).fill(out||"Retry generation");
}

tweets=tweets.slice(0,4);
lastTweets=tweets;

let ranked=tweets.map(t=>({t,score:scoreAdvanced(t)})).sort((a,b)=>b.score-a.score);

$('multiOutput').classList.remove('hidden');
$('multiOutput').innerHTML=ranked.map((r,i)=>`
<div class='p-3 bg-gray-700 rounded'>
<b>Rank ${i+1} | Beast Score ${r.score}</b>
<p>${r.t}</p>
</div>`).join('');

$('refineBtn').classList.remove('hidden');
}

async function beastRefine(){
const key=$('apiKey').value;
if(!lastTweets.length) return;

let improved=lastTweets[0];
let attempts=0;
let finalTweet=improved;
let bestScore=0;

while(attempts<5){
attempts++;

let s=scoreAdvanced(improved);
if(s>=85){
finalTweet=improved;
bestScore=s;
break;
}

const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
method:"POST",
headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
body:JSON.stringify({
model:"llama-3.3-70b-versatile",
messages:[
{role:"system",content:"Improve this tweet for maximum virality, emotional hook, and natural tone."},
{role:"user",content:improved}
],temperature:0.95
})
});

const data=await res.json();
improved=data?.choices?.[0]?.message?.content||improved;
finalTweet=improved;
}

$('multiOutput').innerHTML+=`
<div class='p-3 bg-purple-700 rounded mt-3'>
<b>🔥 Beast Optimized Tweet</b>
<p>${finalTweet}</p>
<p class='text-sm text-gray-300'>Score: ${scoreAdvanced(finalTweet)} | Attempts: ${attempts}</p>
</div>`;
}

</script>

</body>
</html>
