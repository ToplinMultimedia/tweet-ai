<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tweet-AI — By Toluspace</title>
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#020612; --card:#0a0f1d; --s1:#080e1c; --border:#1a2333; --border2:#2a3a5a;
  --x:#1d9bf0; --purple:#a855f7; --green:#10b981; --gold:#fbbf24; --text:#f1f5f9; --muted:#64748b;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Cabinet Grotesk', sans-serif; background:var(--bg); color:var(--text); padding:20px; line-height:1.5; }
.container { max-width:850px; margin:0 auto; }

/* BRANDING & LOGO */
.logo-area { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:30px; }
.logo-icon { width:50px; height:50px; background:linear-gradient(135deg, var(--x), var(--purple)); border-radius:12px; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:24px; color:white; box-shadow:0 0 20px rgba(29, 155, 240, 0.4); }
.logo-text { font-size:28px; font-weight:900; letter-spacing:-1px; }
.logo-text span { background:linear-gradient(90deg, var(--x), var(--purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

.card { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:28px; box-shadow:0 20px 50px rgba(0,0,0,0.6); margin-bottom:20px; position:relative; overflow:hidden; }
.card::before { content:''; position:absolute; top:0; left:0; width:100%; height:2px; background:linear-gradient(90deg, transparent, var(--x), var(--purple), transparent); }

input, select, textarea { width:100%; background:var(--s1); border:1px solid var(--border); color:white; padding:14px; border-radius:12px; margin-top:10px; font-family:inherit; transition:0.3s; }
input:focus, select:focus, textarea:focus { border-color:var(--x); outline:none; box-shadow:0 0 10px rgba(29,155,240,0.2); }

.grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-top:12px; }
.btn-main { width:100%; padding:20px; margin-top:20px; border:none; border-radius:14px; background:linear-gradient(135deg, var(--x), var(--purple)); color:white; font-weight:900; cursor:pointer; font-size:16px; text-transform:uppercase; letter-spacing:1px; }
.btn-main:hover { filter:brightness(1.1); transform:translateY(-2px); }
.btn-main:disabled { opacity:0.5; cursor:not-allowed; }

/* OUTPUT CARDS */
.tc { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:24px; margin-top:20px; transition:0.3s; }
.tc:hover { border-color:var(--border2); transform:scale(1.01); }
.badge { font-size:10px; font-weight:900; padding:4px 10px; border-radius:6px; border:1px solid var(--x); color:var(--x); text-transform:uppercase; display:inline-block; margin-bottom:12px; }
.badge-banter { border-color:var(--gold); color:var(--gold); }

.algo-header { display:flex; justify-content:space-between; font-size:11px; color:var(--muted); font-family:'JetBrains Mono'; margin-bottom:8px; }
.algo-bar { height:5px; background:rgba(255,255,255,0.05); border-radius:10px; overflow:hidden; margin-bottom:20px; }
.algo-fill { height:100%; background:linear-gradient(90deg, var(--x), var(--purple)); border-radius:10px; transition:2s cubic-bezier(0.1, 1, 0.1, 1); }

.content { font-size:17px; line-height:1.7; white-space:pre-line; color:#fff; }
.meta-info { display:flex; gap:15px; margin-top:20px; padding-top:15px; border-top:1px solid var(--border); font-size:12px; color:var(--muted); }
.copy-btn { background:none; border:none; color:var(--x); cursor:pointer; font-weight:900; font-size:12px; margin-top:15px; display:flex; align-items:center; gap:5px; }

#status { text-align:center; margin-top:15px; font-size:13px; font-weight:700; color:var(--purple); min-height:20px; }
</style>
</head>
<body>
<div class="container">
    <div class="logo-area">
        <div class="logo-icon">T</div>
        <div class="logo-text">Tweet AI - <span>Toluspace</span></div>
    </div>

    <div class="card">
        <input type="password" id="apiKey" placeholder="Paste Gemini API Key (v1beta Stable)">
        
        <div class="grid-3">
            <div>
                <label style="font-size:11px; color:var(--muted)">NICHE SECTOR</label>
                <select id="niche">
                    <option value="eFootball & Gaming">🎮 eFootball / Gaming</option>
                    <option value="Tech & AI">⚡ Tech & AI</option>
                    <option value="Nigerian Culture/Cruise">🇳🇬 Cruise & Banter</option>
                    <option value="Finance & Crypto">💰 Finance / Web3</option>
                    <option value="Graphics & Design">🎨 Creative Design</option>
                    <option value="Football/Sports">⚽ Global Sports</option>
                    <option value="Relationships">❤️ Relationships</option>
                    <option value="Music & Entertainment">🎵 Music / Pop</option>
                </select>
            </div>
            <div>
                <label style="font-size:11px; color:var(--muted)">CONTENT VIBE</label>
                <select id="vibe">
                    <option value="Savage Banter">🌶️ Savage Banter</option>
                    <option value="Cruise/Humor">😂 Pure Cruise</option>
                    <option value="Intellectual/Expert">🎯 Expert Authority</option>
                    <option value="Contrarian/Hot Take">🔥 Hot Take</option>
                    <option value="Emotional/Story">📖 Storytelling</option>
                </select>
            </div>
            <div>
                <label style="font-size:11px; color:var(--muted)">ALGO GOAL</label>
                <select id="goal">
                    <option value="Maximum Replies">💬 Reply Bait</option>
                    <option value="High Retweets">🚀 Shareability</option>
                    <option value="Bookmarks/Value">🔖 Saveable Info</option>
                </select>
            </div>
        </div>

        <textarea id="topic" rows="3" placeholder="Context (e.g. New Messi card, Elon's tweet, Nigerian wedding, AI update...)"></textarea>
        <button class="btn-main" id="btn" onclick="generate()">DEPLOY ALGORITHM BYPASS</button>
        <div id="status"></div>
    </div>
    <div id="results"></div>
    <h6 style="text-align: center; color:#8b5cf6 "><span><i>Wavyspace Technology</i></span></h6>
</div>

<script>
document.getElementById('apiKey').value = localStorage.getItem('phx_v13_key') || '';

async function generate() {
    const key = document.getElementById('apiKey').value.trim();
    const niche = document.getElementById('niche').value;
    const vibe = document.getElementById('vibe').value;
    const goal = document.getElementById('goal').value;
    const topic = document.getElementById('topic').value || "current 2026 trends";
    const status = document.getElementById('status');
    const results = document.getElementById('results');
    const btn = document.getElementById('btn');

    if(!key) return alert("Please provide an API Key.");
    localStorage.setItem('phx_v13_key', key);
    
    btn.disabled = true;
    status.innerText = "Injecting 15 Copywriting Skills...";
    results.innerHTML = "";

    const systemPrompt = `You are a World-Class X Algorithm Engineer. Current Date: April 2026.
    Apply the 15 Skills: 1. Hook Writing (Stop scroll) 2. Persuasion 3. Engagement Bait 4. Storytelling 5. Curiosity Gaps 6. Emotional Triggers 7. Audience Lingo (e.g. 'Meta', 'Omo', 'NGMI', 'Steeze') 8. Controversy 9. Readability (Short lines) 10. Authority 11. Value 12. CTA 13. Sharp Editing 14. Virality Engineering 15. Dwell Time.
    
    Task: Generate 2 Viral Tweets and 2 Power Replies (comments).
    Niche: ${niche}. Vibe: ${vibe}. Goal: ${goal}. Topic: ${topic}.
    Return ONLY a JSON array: [{"type":"tweet","content":"...","score":98,"logic":"..."}]`;

    // Try multiple models for regional stability
    const models = ["gemini-3.1-flash-lite-preview", "gemini-2.5-flash", "gemini-1.5-flash"];
    
    for (let model of models) {
        try {
            status.innerText = `Connecting via ${model}...`;
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    contents: [{parts: [{text: systemPrompt}]}],
                    generationConfig: { responseMimeType: "application/json", temperature: 0.9 }
                })
            });

            if (!response.ok) continue;

            const data = await response.json();
            const items = JSON.parse(data.candidates[0].content.parts[0].text);
            
            items.forEach(item => {
                const score = item.score || 90;
                results.innerHTML += `
                    <div class="tc">
                        <div class="algo-header">
                            <span>ALGO VECTOR STRENGTH</span>
                            <span style="color:var(--x)">${score}/100</span>
                        </div>
                        <div class="algo-bar"><div class="algo-fill" style="width:${score}%"></div></div>
                        <span class="badge ${item.type === 'reply' ? 'badge-banter' : ''}">${item.type}</span>
                        <div class="content">${item.content}</div>
                        <div class="meta-info">
                            <span>🎯 Signal: ${item.logic}</span>
                        </div>
                        <button class="copy-btn" onclick="navigator.clipboard.writeText(\`${item.content}\`)">
                            <span style="font-size:16px;">📋</span> COPY FOR 𝕏
                        </button>
                    </div>`;
            });

            status.innerText = "✅ ALGORITHM BYPASSED SUCCESSFULLY";
            btn.disabled = false; return;
        } catch (e) { console.log(model + " blocked."); }
    }
    status.innerText = "❌ ALL MODELS BLOCKED. Check Key or VPN.";
    btn.disabled = false;
}
</script>
</body>
</html>
